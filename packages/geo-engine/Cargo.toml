[package]
name = "geokit"
version = "0.1.0"
edition = "2021"
license = "MIT"
description = "WASM geo engine: geodesic buffering, H3 indexing, and KMZ parsing for the GIS Conflict Dashboard demo."
repository = "https://github.com/the-snowmen/GIS-Conflict-Dashboard"

[lib]
# cdylib -> the .wasm for wasm-pack; rlib -> link the same crate into native tests/benches.
crate-type = ["cdylib", "rlib"]

[dependencies]
# --- geometry / geodesy (pure-Rust, wasm-safe) ---
geo = "0.33"
geo-types = "0.7"
geojson = { version = "1.0", features = ["geo-types"] }
geographiclib-rs = "0.2"
proj4rs = "0.1"
h3o = { version = "0.10", features = ["geo", "serde"] }
# --- KMZ/KML (in-memory, no fs) ---
# zip: the `deflate` feature wires flate2's pure-Rust `rust_backend` (miniz_oxide) + zopfli —
# all pure Rust, no zstd/bzip2/aes/lzma C deps (those won't cross to wasm). kml: drop its
# default `zip` feature (pulls full zip incl. zstd-sys); keep the `geo-types` conversion we
# use. We do the unzip ourselves with the lean `zip` above.
zip = { version = "2", default-features = false, features = ["deflate"] }
kml = { version = "0.13", default-features = false, features = ["geo-types"] }
quick-xml = "0.37"
# --- serde ---
serde = { version = "1", features = ["derive"] }
serde_json = "1"

# wasm-only bindings; kept out of native test/bench builds so cargo test/bench link cleanly.
[target.'cfg(target_arch = "wasm32")'.dependencies]
wasm-bindgen = "0.2"
serde-wasm-bindgen = "0.6"
js-sys = "0.3"
console_error_panic_hook = "0.1"

[dev-dependencies]
criterion = { version = "0.5", default-features = false }
approx = "0.5"

[[bench]]
name = "geo_benches"
harness = false
